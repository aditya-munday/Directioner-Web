openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Directioner API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profiles
    description: User profile operations
  - name: servers
    description: Discord server operations
  - name: analytics
    description: Analytics operations
  - name: memory
    description: Memory node operations
  - name: activity
    description: Activity feed operations
  - name: billing
    description: Billing history operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get profile by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Profile found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateProfile
      tags: [profiles]
      summary: Update profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfile"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /servers:
    get:
      operationId: listServers
      tags: [servers]
      summary: List servers for authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Server"
    post:
      operationId: createServer
      tags: [servers]
      summary: Create a server
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServer"
      responses:
        "201":
          description: Server created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server"

  /servers/{id}:
    get:
      operationId: getServer
      tags: [servers]
      summary: Get server by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Server found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateServer
      tags: [servers]
      summary: Update server
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServer"
      responses:
        "200":
          description: Server updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteServer
      tags: [servers]
      summary: Delete server
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /analytics:
    get:
      operationId: listAnalytics
      tags: [analytics]
      summary: List analytics entries
      security:
        - bearerAuth: []
      parameters:
        - name: serverId
          in: query
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Analytics entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalyticsEntry"
    post:
      operationId: createAnalytics
      tags: [analytics]
      summary: Record analytics entry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnalytics"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsEntry"

  /memory-nodes:
    get:
      operationId: listMemoryNodes
      tags: [memory]
      summary: List memory nodes
      security:
        - bearerAuth: []
      parameters:
        - name: serverId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Memory nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoryNode"
    post:
      operationId: createMemoryNode
      tags: [memory]
      summary: Create memory node
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoryNode"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryNode"

  /memory-nodes/{id}:
    delete:
      operationId: deleteMemoryNode
      tags: [memory]
      summary: Delete memory node
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /activity-feed:
    get:
      operationId: listActivityFeed
      tags: [activity]
      summary: List activity feed
      security:
        - bearerAuth: []
      parameters:
        - name: serverId
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"
    post:
      operationId: createActivityEntry
      tags: [activity]
      summary: Create activity entry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityEntry"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityEntry"

  /billing:
    get:
      operationId: listBilling
      tags: [billing]
      summary: List billing history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Billing entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingEntry"
    post:
      operationId: createBillingEntry
      tags: [billing]
      summary: Create billing entry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBillingEntry"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingEntry"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Profile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        tier:
          type: string
          enum: [free, basic, pro, max]
        creditsUsed:
          type: integer
        creditsLimit:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - tier
        - creditsUsed
        - creditsLimit
        - createdAt
        - updatedAt

    UpdateProfile:
      type: object
      properties:
        username:
          type: string
        tier:
          type: string
          enum: [free, basic, pro, max]
        creditsUsed:
          type: integer
        creditsLimit:
          type: integer

    Server:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        serverName:
          type: string
        discordServerId:
          type: string
        memberCount:
          type: integer
        channelCount:
          type: integer
        status:
          type: string
          enum: [online, offline, maintenance]
        tier:
          type: string
        aiMode:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - serverName
        - discordServerId
        - memberCount
        - channelCount
        - status
        - tier
        - aiMode
        - createdAt

    CreateServer:
      type: object
      properties:
        serverName:
          type: string
        discordServerId:
          type: string
        memberCount:
          type: integer
        channelCount:
          type: integer
        status:
          type: string
          enum: [online, offline, maintenance]
        tier:
          type: string
        aiMode:
          type: string
      required:
        - serverName
        - discordServerId

    UpdateServer:
      type: object
      properties:
        serverName:
          type: string
        discordServerId:
          type: string
        memberCount:
          type: integer
        channelCount:
          type: integer
        status:
          type: string
          enum: [online, offline, maintenance]
        tier:
          type: string
        aiMode:
          type: string

    AnalyticsEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        serverId:
          type: string
          format: uuid
          nullable: true
        date:
          type: string
          format: date
        textMessages:
          type: integer
        voiceMinutes:
          type: integer
        credits:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - date
        - textMessages
        - voiceMinutes
        - credits
        - createdAt

    CreateAnalytics:
      type: object
      properties:
        serverId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        textMessages:
          type: integer
        voiceMinutes:
          type: integer
        credits:
          type: integer
      required:
        - date

    MemoryNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        serverId:
          type: string
          format: uuid
          nullable: true
        content:
          type: string
        scope:
          type: string
          enum: [user, server, global]
        targetUser:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - content
        - scope
        - createdAt

    CreateMemoryNode:
      type: object
      properties:
        serverId:
          type: string
          format: uuid
        content:
          type: string
        scope:
          type: string
          enum: [user, server, global]
        targetUser:
          type: string
      required:
        - content

    ActivityEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        serverId:
          type: string
          format: uuid
          nullable: true
        eventType:
          type: string
        channel:
          type: string
          nullable: true
        actor:
          type: string
          nullable: true
        details:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - eventType
        - details
        - createdAt

    CreateActivityEntry:
      type: object
      properties:
        serverId:
          type: string
          format: uuid
        eventType:
          type: string
        channel:
          type: string
        actor:
          type: string
        details:
          type: string
      required:
        - eventType

    BillingEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        amount:
          type: string
        status:
          type: string
          enum: [paid, pending, failed, refunded]
        description:
          type: string
          nullable: true
        invoiceUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - amount
        - status
        - createdAt

    CreateBillingEntry:
      type: object
      properties:
        amount:
          type: string
        status:
          type: string
          enum: [paid, pending, failed, refunded]
        description:
          type: string
        invoiceUrl:
          type: string
      required:
        - amount
