name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared libs (generates .d.ts for api-server)
        run: pnpm run typecheck:libs

      - name: Type-check frontend
        run: pnpm --filter @workspace/directioner run typecheck

      - name: Type-check API server
        run: pnpm --filter @workspace/api-server run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared libs
        run: pnpm run typecheck:libs

      - name: Run frontend tests
        run: pnpm --filter @workspace/directioner run test
        env:
          CI: true

      - name: Run API tests
        run: pnpm --filter @workspace/api-server run test
        env:
          CI: true
          NODE_ENV: test

  lint:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Prettier formatting
        run: pnpm exec prettier --check .

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared libs
        run: pnpm run typecheck:libs

      - name: Build frontend
        run: pnpm --filter @workspace/directioner run build
        env:
          BASE_PATH: /

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build
