server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options        "DENY"                   always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # Health check endpoint (for Docker/load-balancer)
    location = /healthz {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Proxy /api/* to the Express API server
    location /api/ {
        proxy_pass         http://api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;

        # Increase body limit for webhooks
        client_max_body_size 1m;
    }

    # Static assets — long cache TTL (Vite fingerprints filenames)
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|ico|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all other routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
