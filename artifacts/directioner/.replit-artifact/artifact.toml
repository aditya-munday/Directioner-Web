kind = "web"
previewPath = "/"
title = "Directioner"
version = "1.0.0"
id = "artifacts/directioner"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25220

[services.development]
run = "pnpm --filter @workspace/directioner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/directioner", "run", "build" ]
serve = "static"
publicDir = "artifacts/directioner/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25220"
BASE_PATH = "/"
